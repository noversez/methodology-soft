spring:
  datasource:
    url: jdbc:h2:mem:dims;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

dims:
  storage-path: ./target/test-storage
  report-media-memory-limit-mb: 20
