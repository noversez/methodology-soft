server:
  port: 8080

spring:
  application:
    name: dims-casebook-holmes
  datasource:
    url: ${DIMS_DATABASE_URL:jdbc:postgresql://127.0.0.1:5433/dims}
    username: ${DIMS_DATABASE_USERNAME:dims}
    password: ${DIMS_DATABASE_PASSWORD:dims}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DIMS_DATABASE_POOL_SIZE:10}
      minimum-idle: 2
      connection-timeout: 5000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-migration-naming: true
  servlet:
    multipart:
      max-file-size: ${DIMS_FILE_UPLOAD_MAX_MB:20}MB
      max-request-size: ${DIMS_FILE_UPLOAD_MAX_MB:20}MB

dims:
  file-upload-max-mb: ${DIMS_FILE_UPLOAD_MAX_MB:20}
  file-upload-platform-max-mb: 50
  storage-path: ${DIMS_STORAGE_PATH:./storage}
  audit-retention-days: 180
  report-media-memory-limit-mb: ${DIMS_REPORT_MEDIA_MEMORY_LIMIT_MB:20}
